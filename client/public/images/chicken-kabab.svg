<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <!-- Background -->
  <rect width="600" height="500" fill="#2a2a2a"/>
  
  <!-- Plate -->
  <ellipse cx="300" cy="280" rx="150" ry="120" fill="#f5f5f5" stroke="#999" stroke-width="2"/>
  <ellipse cx="300" cy="280" rx="140" ry="110" fill="#ffffff"/>
  
  <!-- Skewers with chicken -->
  <g transform="translate(300, 280)">
    <!-- Skewer 1 -->
    <line x1="-100" y1="60" x2="100" y2="-60" stroke="#654321" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-80" cy="48" r="14" fill="#f4a460"/>
    <circle cx="-50" cy="30" r="14" fill="#daa520"/>
    <circle cx="-20" cy="12" r="14" fill="#f4a460"/>
    <circle cx="10" cy="-6" r="14" fill="#daa520"/>
    <circle cx="40" cy="-24" r="14" fill="#f4a460"/>
    <circle cx="70" cy="-42" r="14" fill="#daa520"/>
    
    <!-- Skewer 2 -->
    <line x1="100" y1="60" x2="-100" y2="-60" stroke="#654321" stroke-width="5" stroke-linecap="round"/>
    <circle cx="80" cy="48" r="14" fill="#cd853f"/>
    <circle cx="50" cy="30" r="14" fill="#f4a460"/>
    <circle cx="20" cy="12" r="14" fill="#cd853f"/>
    <circle cx="-10" cy="-6" r="14" fill="#f4a460"/>
    <circle cx="-40" cy="-24" r="14" fill="#cd853f"/>
    <circle cx="-70" cy="-42" r="14" fill="#f4a460"/>
    
    <!-- Vegetables -->
    <rect x="-120" y="-20" width="20" height="20" fill="#22c55e" rx="3"/>
    <rect x="100" y="-20" width="20" height="20" fill="#22c55e" rx="3"/>
    
    <!-- Lemon -->
    <circle cx="0" cy="-100" r="12" fill="#fbbf24"/>
  </g>
  
  <!-- Shadows -->
  <ellipse cx="300" cy="400" rx="100" ry="20" fill="#000000" opacity="0.2"/>
  
  <!-- Text -->
  <text x="300" y="450" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#d4af37" text-anchor="middle">كباب دجاج طازة</text>
</svg>
